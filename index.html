<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;800&display=swap');

        :root {
            --primary: #fbff00; 
            --primary-dark: #b8bb00;
            --bg: #050505;
            --card-bg: #111111;
            --accent-gray: #1a1a1a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Фоновое свечение вместо логотипа */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(251, 255, 0, 0.05) 0%, transparent 80%);
            z-index: -1;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            background: linear-gradient(180deg, rgba(251, 255, 0, 0.1) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(251, 255, 0, 0.1);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 15px;
            color: var(--primary);
            text-shadow: 4px 4px 0px rgba(0,0,0,1), 0 0 30px rgba(251, 255, 0, 0.3);
            margin: 0;
        }

        .header-credits {
            color: #666; 
            font-size: 0.9rem; 
            letter-spacing: 5px; 
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 10px;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 60px;
            text-transform: uppercase;
        }

        h2::after {
            content: "";
            height: 2px;
            flex-grow: 1;
            background: linear-gradient(90deg, var(--primary), transparent);
        }

        h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 3px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .player-card {
            background: var(--card-bg);
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid #222;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        .player-card:hover {
            border-bottom-color: var(--primary);
            transform: translateY(-10px);
            background: #1a1a1a;
        }

        .player-photo {
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, #1a1a1a, #0a0a0a);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Текстовая заглушка вместо лого на карточках */
        .player-photo::before {
            content: "REVOLT"; 
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--primary);
            opacity: 0.05;
        }

        .player-info {
            padding: 20px;
            position: relative;
        }

        .player-role {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5
