<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;800&display=swap');

        :root {
            --primary: #fbff00; 
            --primary-dark: #b8bb00;
            --bg: #050505;
            --card-bg: #111111;
            --accent-gray: #1a1a1a;
            --text: #ffffff;
            /* Ссылка на ваше лого */
            --logo-url: url('image_0.png'); 
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Фоновый шум и большое полупрозрачное лого на фоне */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(251, 255, 0, 0.05) 0%, transparent 80%),
                var(--logo-url) no-repeat center center / 60% fixed; /* Большое лого на фоне */
            opacity: 0.03; /* Очень тонко, еле заметно */
            z-index: -1;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            background: linear-gradient(180deg, rgba(251, 255, 0, 0.15) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(251, 255, 0, 0.1);
        }

        .header-logo-block {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .header-logo-img {
            width: 70px; /* Размер лого в шапке */
            height: auto;
            filter: drop-shadow(0 0 10px rgba(251, 255, 0, 0.5));
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: var(--primary);
            text-shadow: 3px 3px 0px rgba(0,0,0,1), 0 0 20px rgba(251, 255, 0, 0.3);
            margin: 0;
        }

        .header-credits {
            color: #666; 
            font-size: 0.9rem; 
            letter-spacing: 4px; 
            font-weight: 600;
            text-transform: uppercase;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 60px;
            text-transform: uppercase;
        }

        h2::after {
            content: "";
            height: 2px;
            flex-grow: 1;
            background: linear-gradient(90deg, var(--primary), transparent);
        }

        h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 3px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Сетка игроков */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .player-card {
            background: var(--card-bg);
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid #222;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        .player-card:hover {
            border-bottom-color: var(--primary);
            transform: translateY(-10px);
            background: #1a1a1a;
        }

        .player-photo {
            width: 100%;
            height: 220px;
            background: linear-gradient(180deg, #222, #111);
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        /* Маленькое лого как заглушка */
        .player-photo::before {
            content: ""; 
            width: 40px;
            height: 40px;
            background: var(--logo-url) no-repeat center center / contain;
            opacity: 0.2;
            margin-bottom: 20px;
        }

        .player-info {
            padding: 20px;
            position: relative;
        }

        .player-role {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 5px;
        }

        .player-nick {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        /* Матчи */
        .match-card {
            background: var(--card-bg);
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px;
            border-left: 5px solid var(--accent-gray);
            border-radius: 4px;
            position: relative;
        }
        
        /* Лого Revolt как иконка команды */
        .match-card::after {
            content: "";
            position: absolute;
            left: 10px; top: 10px;
            width: 20px; height: 20px;
            background: var(--logo-url) no-repeat center center / contain;
            opacity: 0.5;
        }

        .match-team {
            font-weight: 800;
            font-size: 1.2rem;
            width: 40%;
            text-align: center;
            text-transform: uppercase;
        }

        .match-vs {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-style: italic;
        }

        .match-status {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Соцсети */
        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 80px 0;
            flex-wrap: wrap;
        }

        .soc-link {
            padding: 12px 30px;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            text-transform: uppercase;
        }

        .soc-link:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            transform: skewX(-5deg);
        }

        .sub-grid {
            opacity: 0.7;
        }

    </style>
</head>
<body>

<header>
    <div class="header-logo-block">
        <img src="image_0.png" alt="Revolt Logo" class="header-logo-img">
        <p class="logo-text">REVOLT</p>
    </div>
    <div class="header-credits">EST. 2024 | DIVISION: RUSSIA</div>
</header>

<div class="container">
    
    <h2>Roster / <span style="color: var(--primary)">Основа</span></h2>
    <h3>MAIN SQUAD</h3>
    
    <div class="roster-grid">
        <div class="player-card">
            <div class="player-photo"></div>
            <div class="player-info">
                <span class="player-role">Captain</span>
                <div class="player-nick">Fon1m</div>
            </div>
        </div>

        <div class="player-card">
            <div class="player-photo"></div>
            <div class="player-info">
                <span class="player-role">Entry Fragger</span>
                <div class="player-nick">Триксис</div>
            </div>
        </div>

        <div class="player-card">
            <div class="player-photo"></div>
            <div class="player-info">
                <span class="player-role">Opornik</span>
                <div class="player-nick">Лайт</div>
            </div>
        </div>

        <div class="player-card">
            <div class="player-photo"></div>
            <div class="player-info">
                <span class="player-role">Rifler</span>
                <div class="player-nick">Кузя</div>
            </div>
        </div>

        <div class="player-card">
            <div class="player-photo"></div>
            <div class="player-info">
                <span class="player-role">Sniper</span>
                <div class="player-nick">Veillon</div>
            </div>
        </div>
    </div>

    <h2>Roster / <span style="color: #666">Запас</span></h2>
    <h3>RESERVE PLAYERS</h3>
    <div class="roster-grid sub-grid">
        <div class="player-card">
            <div class="player-info">
                <span class="player-role">Substitute</span>
                <div class="player-nick">pusher</div>
            </div>
        </div>
        <div class="player-card">
            <div class="player-info">
                <span class="player-role">Substitute</span>
                <div class="player-nick">$els</div>
            </div>
        </div>
    </div>

    <h2>Schedule / <span style="color: var(--primary)">Матчи</span></h2>
    <div class="match-card">
        <div class="match-team">REVOLT</div>
        <div style="text-align: center;">
            <div class="match-vs">VS</div>
            <div class="match-status">TBD</div>
        </div>
        <div class="match-team" style="color: #444;">OPPONENT</div>
    </div>

    <div class="socials">
        <a href="https://t.me/Revolt_Team12" target="_blank" class="soc-link">TG.STATION</a>
        <a href="https://www.tiktok.com/@fon1m12" target="_blank" class="soc-link">TIKTOK</a>
        <a href="https://www.twitch.tv/fon1m12" target="_blank" class="soc-link">TWITCH</a>
    </div>

</div>

</body>
</html>
