<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #ff0000; letter-spacing: 2px; text-transform: uppercase; }
        .player { background: #1a1a1a; padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; }
        .match { background: #222; padding: 15px; border-radius: 12px; border-left: 4px solid #ff0000; margin: 20px 0; }
        .socials { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
        .btn { text-decoration: none; color: #fff; padding: 10px; border-radius: 8px; font-weight: bold; flex: 1; font-size: 11px; background: #333; }
    </style>
</head>
<body>
    <div class="card">
        <h1>TEAM REVOLT</h1>
        <div class="player"><span>🎮 Player 1</span><b>CAP</b></div>
        <div class="player"><span>🎮 Player 2</span></div>
        <div class="player"><span>🎮 Player 3</span></div>
        <div class="player"><span>🎮 Player 4</span></div>
        <div class="player"><span>🎮 Player 5</span></div>
        <div class="match"><div>ОЖИДАНИЕ МАТЧА</div></div>
        <div class="socials">
            <a href="#" class="btn">Telegram</a>
            <a href="#" class="btn">TikTok</a>
            <a href="#" class="btn">Twitch</a>
        </div>
    </div>
</body>
</html>
