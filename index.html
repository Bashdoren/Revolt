<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;800&display=swap');

        :root {
            --primary: #fbff00; 
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
            /* ТВОЙ ФАЙЛ ДЛЯ ФОНА */
            --logo-url: url('1000032201.png'); 
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Эффект логотипа на заднем фоне */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--logo-url) no-repeat center center / 50% fixed;
            opacity: 0.03;
            z-index: -1;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 0;
            background: linear-gradient(180deg, rgba(251, 255, 0, 0.1) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(251, 255, 0, 0.1);
        }

        .header-logo-img {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(251, 255, 0, 0.5));
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: var(--primary);
            margin: 0;
            text-transform: uppercase;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
            margin-top: 50px;
            text-transform: uppercase;
        }

        /* Сетка для игроков */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .player-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border-bottom: 3px solid #222;
            transition: 0.3s;
        }

        .player-card:hover {
            border-bottom-color: var(--primary);
            transform: translateY(-5px);
        }

        .photo-placeholder {
            width: 100%;
            height: 240px;
            background: linear-gradient(180deg, #1a1a1a, #0a0a0a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-info {
            padding: 20px;
        }

        .player-role {
            font-size: 0.7rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: bold;
        }

        .player-nick {
            font-size: 1.4rem;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            margin-top: 5px;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 60px 0;
        }

        .soc-link {
            text-decoration: none;
            color: #fff;
            padding: 10px 25px;
            border: 1px solid #333;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .soc-link:hover {
            background: var(--primary);
            color: #000;
        }
    </style>
</head>
<body>

<header>
    <img src="1000032201.png" alt="Revolt Logo" class="header-logo-img">
    <p class="logo-text">REVOLT</p>
    <div style="color: #444; letter-spacing: 3px; font-weight: bold;">EST. 2024</div>
</header>

<div class="container">
    <h2>Main Squad / Основа</h2>
    <div class="roster-grid">
        <div class="player-card">
            <div class="photo-placeholder"></div>
            <div class="player-info">
                <span class="player-role">Captain</span>
                <div class="player-nick">Fon1m</div>
            </div>
        </div>
        <div class="player-card">
            <div class="photo-placeholder"></div>
            <div class="player-info">
                <span class="player-role">Player</span>
                <div class="player-nick">Триксис</div>
            </div>
        </div>
        <div class="player-card">
            <div class="photo-placeholder"></div>
            <div class="player-info">
                <span class="player-role">Opornik</span>
                <div class="player-nick">Лайт</div>
            </div>
        </div>
        <div class="player-card">
            <div class="photo-placeholder"></div>
            <div class="player-info">
                <span class="player-role">Player</span>
                <div class="player-nick">Кузя</div>
            </div>
        </div>
        <div class="player-card">
            <div class="photo-placeholder"></div>
            <div class="player-info">
                <span class="player-role">Sniper</span>
                <div class="player-nick">Veillon</div>
            </div>
        </div>
    </div>

    <div class="socials">
        <a href="https://t.me/Revolt_Team12" target="_blank" class="soc-link">Telegram</a>
        <a href="https://www.tiktok.com/@fon1m12" target="_blank" class="soc-link">TikTok</a>
        <a href="https://www.twitch.tv/fon1m12" target="_blank" class="soc-link">Twitch</a>
    </div>
</div>

</body>
</html>
