<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;800&display=swap');

        :root {
            --primary: #fbff00; 
            --bg: #050505;
            --card-bg: rgba(25, 25, 25, 0.9);
            --text: #ffffff;
            /* ВАЖНО: Проверь, чтобы файл назывался именно так или замени тут имя */
            --logo-url: url('1000032201.png'); 
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(251, 255, 0, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                var(--logo-url);
            background-attachment: fixed;
            background-size: cover, cover, 40%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            text-align: center;
        }

        .header-logo-img {
            width: 120px; /* Увеличил лого для солидности */
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(251, 255, 0, 0.4));
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: var(--primary);
            margin: 0;
            text-shadow: 0 0 20px rgba(251, 255, 0, 0.5);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 5px;
            margin-top: 50px;
            text-transform: uppercase;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .player-card {
            background: var(--card-bg);
            border: 1px solid rgba(251, 255, 0, 0.1);
            padding: 25px 15px;
            text-align: left;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
        }

        .player-card:hover {
            border-color: var(--primary);
            background: rgba(251, 255, 0, 0.05);
            transform: translateY(-5px);
        }

        .player-role {
            font-size: 0.6rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .player-nick {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            margin-top: 5px;
        }

        /* Запасные игроки поменьше */
        .sub-grid .player-card {
            padding: 15px;
            opacity: 0.8;
        }

        .match-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
        }

        .vs-badge {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 60px;
        }

        .soc-link {
            text-decoration: none;
            color: #fff;
            padding: 10px 20px;
            border: 1px solid #444;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .soc-link:hover {
            background: var(--primary);
            color: #000;
        }
    </style>
</head>
<body>

<header>
    <img src="1000032201.png" alt="Revolt Logo" class="header-logo-img">
    <p class="logo-text">REVOLT</p>
    <div style="color: #888; letter-spacing: 3px; font-size: 0.8rem;">EST. 2024 | DIVISION: RUSSIA</div>
</header>

<div class="container">
    
    <h2>ROSTER / <span style="color: var(--primary)">ОСНОВА</span></h2>
    <div class="roster-grid">
        <div class="player-card">
            <span class="player-role">Captain</span>
            <div class="player-nick">Fon1m</div>
        </div>
        <div class="player-card">
            <span class="player-role">Entry Fragger</span>
            <div class="player-nick">Триксис</div>
        </div>
        <div class="player-card">
            <span class="player-role">Opornik</span>
            <div class="player-nick">Лайт</div>
        </div>
        <div class="player-card">
            <span class="player-role">Rifler</span>
            <div class="player-nick">Кузя</div>
        </div>
        <div class="player-card">
            <span class="player-role">Sniper</span>
            <div class="player-nick">Veillon</div>
        </div>
    </div>

    <h2>ROSTER / <span style="color: #666">ЗАПАС</span></h2>
    <div class="roster-grid sub-grid">
        <div class="player-card">
            <span class="player-role">Substitute</span>
            <div class="player-nick">pusher</div>
        </div>
        <div class="player-card">
            <span class="player-role">Substitute</span>
            <div class="player-nick">$els</div>
        </div>
    </div>

    <h2>SCHEDULE / <span style="color: var(--primary)">МАТЧИ</span></h2>
    <div class="match-card">
        <div>REVOLT</div>
        <div class="vs-badge">VS</div>
        <div style="color: #555;">TBD</div>
    </div>

    <div class="socials">
        <a href="https://t.me/Revolt_Team12" class="soc-link">TELEGRAM</a>
        <a href="https://www.tiktok.com/@fon1m12" class="soc-link">TIKTOK</a>
        <a href="https://www.twitch.tv/fon1m12" class="soc-link">TWITCH</a>
    </div>
</div>

</body>
</html>
