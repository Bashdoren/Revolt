<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REVOLT TEAM</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">

<style>

:root{
--yellow:#fbff00;
--bg:#060606;
--panel:#111;
--text:#fff;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:'Exo 2',sans-serif;
}

/* HEADER */

header{
text-align:center;
padding:80px 20px;
border-bottom:1px solid #222;
}

.logo{
font-family:'Orbitron';
font-size:70px;
letter-spacing:12px;
color:var(--yellow);
text-shadow:0 0 20px rgba(251,255,0,0.6);
}

.subtitle{
color:#777;
letter-spacing:3px;
margin-top:10px;
}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

/* PANELS */

.panel{

background:var(--panel);

border:1px solid #222;
padding:25px;

position:relative;

transition:0.3s;

}

.panel::before{

content:"";
position:absolute;
top:0;
left:0;
height:3px;
width:100%;
background:var(--yellow);

}

.panel:hover{

transform:translateY(-6px);

box-shadow:0 0 25px rgba(251,255,0,0.15);

}

/* TITLES */

.panel h2{

font-family:'Orbitron';
font-size:18px;
margin-bottom:20px;
}

/* PLAYER */

.player{

padding:10px 0;
border-bottom:1px solid #1f1f1f;

display:flex;
justify-content:space-between;

}

.role{
color:var(--yellow);
font-size:12px;
text-transform:uppercase;
}

/* NO MATCH */

.nomatch{

text-align:center;
padding:40px 0;
color:#777;

font-size:18px;

}

/* SOCIAL */

.socials{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.social{
border:1px solid #333;
padding:10px 16px;
text-decoration:none;
color:#fff;
font-size:12px;
font-weight:700;
transition:0.2s;
}

.social:hover{
background:var(--yellow);
color:#000;
}

</style>
</head>

<body>

<header>

<div class="logo">REVOLT</div>
<div class="subtitle">OFFICIAL ROSTER 2026</div>

</header>

<div class="container">

<!-- СОСТАВ -->

<div class="panel">

<h2>MAIN ROSTER</h2>

<div class="player">
<span>Fon1m</span>
<span class="role">Captain</span>
</div>

<div class="player">
<span>k1t</span>
<span class="role">Player</span>
</div>

<div class="player">
<span>Abybelka</span>
<span class="role">Player</span>
</div>

<div class="player">
<span>peek?</span>
<span class="role">Sniper</span>
</div>

</div>

<!-- ЗАПАС -->

<div class="panel">

<h2>RESERVE</h2>

<div class="player">
<span>Lite</span>
<span class="role">Sub</span>
</div>

</div>

<!-- МАТЧИ -->

<div class="panel">

<h2>MATCHES</h2>

<div class="nomatch">
Сейчас нет матчей
</div>

</div>

<!-- СОЦСЕТИ -->

<div class="panel">

<h2>SOCIAL</h2>

<div class="socials">

<a class="social" href="https://t.me/Revolt_Team12">Telegram</a>

<a class="social" href="https://www.tiktok.com/@fon1m12">TikTok</a>

<a class="social" href="https://www.twitch.tv/fon1m12">Twitch</a>

</div>

</div>

</div>

</body>
</html>
