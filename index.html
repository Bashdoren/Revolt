<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;800&display=swap');

        :root {
            --primary: #fbff00; 
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* КОНТЕЙНЕР */
        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 0;
            background: linear-gradient(180deg, rgba(251, 255, 0, 0.1) 0%, transparent 100%);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(251, 255, 0, 0.4);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
            margin: 40px 0 20px;
            text-transform: uppercase;
        }

        /* СЕТКА ИГРОКОВ */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* КАРТОЧКА С ЭФФЕКТАМИ */
        .player-card {
            background: var(--card-bg);
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid #222; /* Обычная полоска */
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        /* ТО САМОЕ ЖЕЛТОЕ СВЕЧЕНИЕ ПРИ НАЖАТИИ */
        .player-card:hover, .player-card:active {
            border-bottom-color: var(--primary); /* Полоска становится желтой */
            transform: translateY(-5px); /* Карточка чуть прыгает вверх */
            background: #1a1a1a;
            box-shadow: 0 10px 30px rgba(251, 255, 0, 0.2); /* Желтое свечение снизу */
        }

        .player-photo {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #000;
        }

        .player-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-info {
            padding: 12px;
        }

        .player-role {
            font-size: 0.6rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
        }

        .player-nick {
            font-size: 1.1rem;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
        }

        /* МАТЧИ */
        .match-card {
            background: var(--card-bg);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid #222;
            border-left: 4px solid var(--primary);
        }

        /* КНОПКИ СОЦСЕТЕЙ */
        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 50px 0;
        }

        .soc-link {
            padding: 12px 20px;
            border: 1px solid #333;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .soc-link:active {
            background: var(--primary);
            color: #000;
        }
    </style>
</head>
