<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt | Roster</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;800&display=swap');

        :root {
            --primary: #fbff00; 
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 0;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-img {
            width: 80px;
            filter: drop-shadow(0 0 10px var(--primary));
            margin-bottom: 10px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--primary);
            margin: 0;
            letter-spacing: 5px;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
            text-transform: uppercase;
            margin: 40px 0 20px;
        }

        /* Сетка карточек */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Карточка игрока */
        .player-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s;
            position: relative;
        }

        .player-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        /* Контейнер для фото */
        .photo-container {
            width: 100%;
            height: 280px; /* Высота области фото */
            background: linear-gradient(180deg, #1a1a1a 0%, #050505 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        .player-photo {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Фото заполняет область без искажений */
            object-position: top center;
            /* Если фото нет, будет видна пустота или градиент */
        }

        /* Инфо об игроке */
        .player-info {
            padding: 15px;
            background: #151515;
            border-top: 2px solid #222;
        }

        .player-role {
            font-size: 0.7rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .player-nick {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            margin-top: 5px;
            font-weight: 900;
        }

        .sub-grid {
            opacity: 0.8;
        }
        
        .sub-grid .photo-container {
            height: 150px; /* Фото запасных поменьше */
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="1000032201.png" alt="Logo" class="logo-img">
        <p class="logo-text">REVOLT</p>
    </header>

    <h2>Main Squad / <span style="color: var(--primary)">Основа</span></h2>
    <div class="roster-grid">
        
        <div class="player-card">
            <div class="photo-container">
                <img src="player_fon1m.png" alt="Fon1m" class="player-photo">
            </div>
            <div class="player-info">
                <span class="player-role">Captain</span>
                <div class="player-nick">Fon1m</div>
            </div>
        </div>

        <div class="player-card">
            <div class="photo-container">
                <img src="player_triksis.png" alt="Триксис" class="player-photo">
            </div>
            <div class="player-info">
                <span class="player-role">Entry Fragger</span>
                <div class="player-nick">Триксис</div>
            </div>
        </div>

        <div class="player-card">
            <div class="photo-container">
                <img src="player_light.png" alt="Лайт" class="player-photo">
            </div>
            <div class="player-info">
                <span class="player-role">Opornik</span>
                <div class="player-nick">Лайт</div>
            </div>
        </div>

        <div class="player-card">
            <div class="photo-container">
                <img src="player_kuzya.png" alt="Кузя" class="player-photo">
            </div>
            <div class="player-info">
                <span class="player-role">Rifler</span>
                <div class="player-nick">Кузя</div>
            </div>
        </div>

        <div class="player-card">
            <div class="photo-container">
                <img src="player_veillon.png" alt="Veillon" class="player-photo">
            </div>
            <div class="player-info">
                <span class="player-role">Sniper</span>
                <div class="player-nick">Veillon</div>
            </div>
        </div>

    </div>

    <h2>Reserves / <span style="color: #666">Запас</span></h2>
    <div class="roster-grid sub-grid">
        <div class="player-card">
            <div class="photo-container">
                <img src="player_pusher.png" alt="Pusher" class="player-photo">
            </div>
            <div class="player-info">
                <span class="player-role">Sub</span>
                <div class="player-nick">pusher</div>
            </div>
        </div>
        <div class="player-card">
            <div class="photo-container">
                <img src="player_els.png" alt="$els" class="player-photo">
            </div>
            <div class="player-info">
                <span class="player-role">Sub</span>
                <div class="player-nick">$els</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
