<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt | Highlights</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .yellow { color: #ffcc00; }
        .blue { color: #00e5ff; }

        /* Секция МАТЧА (раскрывающаяся) */
        .match-box {
            max-width: 500px;
            margin: 20px auto;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.1);
        }

        .match-trigger {
            background: #1a1a1a;
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .match-trigger:hover { background: #222; border-color: #ffcc00; }

        .match-content {
            display: none; /* Скрыто до нажатия */
            padding: 20px;
            background: #0a0a0a;
            border-top: 2px solid #333;
        }

        /* Стиль для видео (чтобы было адаптивным на телефоне) */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Соотношение сторон 16:9 */
            height: 0;
            overflow: hidden;
            margin-bottom: 20px; /* Отступ перед составами */
            border-radius: 8px;
            border: 1px solid #333;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .grid h4 { margin-top: 0; font-size: 0.8em; color: #666; text-transform: uppercase; }

        .list { list-style: none; padding: 0; margin: 0; font-size: 0.9em; }
        .list li { padding: 5px 0; border-bottom: 1px solid #111; }

        .subs {
            margin-top: 20px;
            font-size: 0.8em;
            color: #888;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Последние игры</h1>
    
    <div class="match-box">
        <div class="match-trigger" onclick="toggleMatch()">
            <span class="yellow" style="font-weight:bold">REVOLT</span>
            <span style="background:#333; padding: 2px 10px; border-radius: 4px;">16 : 13</span>
            <span class="blue" style="font-weight:bold">AURORA</span>
        </div>

        <div id="matchDetails" class="match-content">
            
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                    title="YouTube video player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="grid">
                <div>
                    <h4>Lineup Revolt</h4>
                    <ul class="list">
                        <li>⚡ Fon1m</li>
                        <li>⚡ peek?</li>
                        <li>⚡ Триксис</li>
                        <li>⚡ Gloderi</li>
                        <li>⚡ l4mice</li>
                    </ul>
                </div>
                <div>
                    <h4 class="blue">Lineup Aurora</h4>
                    <ul class="list">
                        <li>👤 Easyyy</li>
                        <li>👤 k1toemy</li>
                        <li>👤 90</li>
                        <li>👤 Benzo</li>
                        <li>👤 Shumniy</li>
                    </ul>
                </div>
            </div>
            
            <div class="subs">
                <b class="yellow">ЗАПАС:</b> Кузя, Лайт.
            </div>
        </div>
    </div>

    <script>
        function toggleMatch() {
            var div = document.getElementById("matchDetails");
            if (div.style.display === "block") {
                div.style.display = "none";
            } else {
                div.style.display = "block";
            }
        }
    </script>

</body>
</html>
