<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;800&display=swap');

        :root {
            --primary: #fbff00; 
            --primary-dark: #b8bb00;
            --bg: #050505;
            --card-bg: #111111;
            --accent-gray: #1a1a1a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(251, 255, 0, 0.05) 0%, transparent 80%);
            z-index: -1;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 0 60px;
            background: linear-gradient(180deg, rgba(251, 255, 0, 0.1) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(251, 255, 0, 0.1);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 15px;
            color: var(--primary);
            text-shadow: 4px 4px 0px rgba(0,0,0,1), 0 0 30px rgba(251, 255, 0, 0.3);
            margin: 0;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 60px;
            text-transform: uppercase;
        }

        h2::after {
            content: "";
            height: 2px;
            flex-grow: 1;
            background: linear-gradient(90deg, var(--primary), transparent);
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .player-card {
            background: var(--card-bg);
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid #222;
            transition: 0.4s;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        .player-card:hover {
            border-bottom-color: var(--primary);
            transform: translateY(-10px);
            background: #1a1a1a;
        }

        .player-photo {
            width: 100%;
            height: 250px;
            background: linear-gradient(180deg, #222, #000);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        .player-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }

        .player-info {
            padding: 20px;
            background: #111;
        }

        .player-role {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 5px;
        }

        .player-nick {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        .match-card {
            background: var(--card-bg);
            padding: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid #222;
            border-left: 4px solid var(--primary);
            margin-top: 20px;
        }

        .vs-tag {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            margin: 0 20px;
        }

        .team-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 80px 0;
            flex-wrap: wrap;
        }

        .soc-link {
            padding: 12px 30px;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            text-transform: uppercase;
        }

        .soc-link:hover {
            background: var(--primary);
            color: #000;
            transform: skewX(-5deg);
        }

        .sub-grid { opacity: 0.7; }

    </style>
</head>
<body>

<header>

    <div style="color: #666; font-size: 0.9rem; margin-top: 15px; letter-spacing: 4px; font-weight: 600;">EST. 2024 | DIVISION: RUSSIA</div>

    <div class="socials">

</div>

</body>
</html>
