<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Revolt | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;800&display=swap');

        :root {
            --primary: #fbff00; 
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 0 30px;
            background: linear-gradient(180deg, rgba(251, 255, 0, 0.1) 0%, transparent 100%);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 10px;
            color: var(--primary);
            margin: 0;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin: 40px 0 20px;
            text-transform: uppercase;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 игрока в ряд на мобиле */
            gap: 12px;
        }

        .player-card {
            background: var(--card-bg);
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .player-photo {
            width: 100%;
            aspect-ratio: 1/1; /* Квадратная форма */
            background: #000;
        }

        .player-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ФОТО ЦЕЛИКОМ, БЕЗ ОБРЕЗКИ */
        }

        .player-info {
            padding: 10px;
        }

        .player-role {
            font-size: 0.6rem;
            color: var(--primary);
            text-transform: uppercase;
            display: block;
        }

        .player-nick {
            font-size: 1rem;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
        }

        .match-card {
            background: var(--card-bg);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            border: 1px solid #222;
            margin-top: 10px;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 40px 0;
        }

        .soc-link {
            padding: 10px 15px;
            border: 1px solid #333;
            color: #fff;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <p class="logo-text">REVOLT</p>
    <div style="color: #666; font-size: 0.8rem; margin-top: 10px;">EST. 2024 | RUSSIA</div>
</header>

<div class="container">
    
    <h2>Roster / <span style="color: var(--primary)">Основа</span></h2>
    <div class="roster-grid">
        <div class="player-card">
            <div class="player-photo"><img src="fon1m.png" class="player-img"></div>
            <div class="player-info">
                <span class="player-role">Captain</span>
                <div class="player-nick">Fon1m</div>
            </div>
        </div>
        <div class="player-card">
            <div class="player-photo"><img src="triksis.png" class="player-img"></div>
            <div class="player-info">
                <span class="player-role">Entry Fragger</span>
                <div class="player-nick">Триксис</div>
            </div>
        </div>
        <div class="player-card">
            <div class="player-photo"><img src="light.png" class="player-img"></div>
            <div class="player-info">
                <span class="player-role">Opornik</span>
                <div class="player-nick">Лайт</div>
            </div>
        </div>
        <div class="player-card">
            <div class="player-photo"><img src="kuzya.png" class="player-img"></div>
            <div class="player-info">
                <span class="player-role">Rifler</span>
                <div class="player-nick">Кузя</div>
            </div>
        </div>
        <div class="player-card">
            <div class="player-photo"><img src="peek.png" class="player-img"></div>
            <div class="player-info">
                <span class="player-role">Sniper</span>
                <div class="player-nick">peek?</div>
            </div>
        </div>
    </div>

    <h2>Roster / <span style="color: #666">Запас</span></h2>
    <div class="roster-grid">
        <div class="player-card">
            <div class="player-info">
                <span class="player-role">Substitute</span>
                <div class="player-nick">Gloderik</div>
            </div>
        </div>
        <div class="player-card">
            <div class="player-info">
                <span class="player-role">Substitute</span>
                <div class="player-nick">l4mice</div>
            </div>
        </div>
    </div>

    <h2>Schedule / <span style="color: var(--primary)">Матчи</span></h2>
    <div class="match-card">
        <div>REVOLT</div>
        <div style="color: var(--primary)">VS</div>
        <div style="color: #666">AURORA</div>
    </div>

    <div class="socials">
        <a href="https://t.me/Revolt_Team12" class="soc-link">TG</a>
        <a href="https://www.tiktok.com/@fon1m12" class="soc-link">TT</a>
        <a href="https://www.twitch.tv/fon1m12" class="soc-link">TW</a>
    </div>

</div>

</body>
</html>
